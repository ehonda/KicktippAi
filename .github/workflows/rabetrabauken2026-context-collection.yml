name: 🏆 WM26 rabetrabauken2026 🏆 Context Collection

on:
  workflow_call:
  # Selected WM26 production reference context workflow.
  # GitHub Actions cron runs in UTC only.
  schedule:
    - cron: '47 23,6,11 * * *'
  workflow_dispatch:

jobs:
  call-base-workflow:
    name: Context Collection - rabetrabauken2026
    uses: ./.github/workflows/base-context-collection.yml
    with:
      community_context: "rabetrabauken2026"
      competition: "fifa-world-cup-2026"
      include_fifa_rankings: true
      include_lineups: true
      trigger_type: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
    secrets:
      kicktipp_username: ${{ secrets.RABETRABAUKEN2026_KICKTIPP_USERNAME }}
      kicktipp_password: ${{ secrets.RABETRABAUKEN2026_KICKTIPP_PASSWORD }}
      firebase_project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      firebase_service_account_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
