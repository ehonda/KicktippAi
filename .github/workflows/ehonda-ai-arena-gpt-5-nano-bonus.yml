name: ehonda-ai-arena ⚽ gpt-5-nano ⚽ Bonus

on:
  # Preliminary WM26 onboarding: manual-only while provisional lineup context is
  # accepted for testing and schedules remain disabled.
  workflow_call:
  # Planned WM26 cadence after context and posting checks pass.
  # Note: GitHub Actions cron runs in UTC only.
  # schedule:
  #   - cron: '47 0,7,12 * * *'
  #
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      force_prediction:
        description: 'Force prediction even if verify passes'
        required: false
        default: false
        type: boolean
      max_repredictions:
        description: 'Maximum number of repredictions allowed (0-based index)'
        required: false
        default: 2
        type: number

jobs:
  call-base-workflow:
    name: Run Bonus Predictions
    uses: ./.github/workflows/base-bonus-predictions.yml
    with:
      community: "ehonda-ai-arena"
      model: "gpt-5-nano"
      reasoning_effort: "minimal"
      community_context: "ehonda-ai-arena"
      trigger_type: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
      force_prediction: ${{ github.event.inputs.force_prediction == 'true' }}
      max_repredictions: ${{ github.event.inputs.max_repredictions == '' && 2 || fromJSON(github.event.inputs.max_repredictions) }}
    secrets:
      kicktipp_username: ${{ secrets.EHONDA_AI_ARENA_GPT_5_NANO_MINIMAL_KICKTIPP_USERNAME }}
      kicktipp_password: ${{ secrets.EHONDA_AI_ARENA_GPT_5_NANO_MINIMAL_KICKTIPP_PASSWORD }}
      firebase_project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      firebase_service_account_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
