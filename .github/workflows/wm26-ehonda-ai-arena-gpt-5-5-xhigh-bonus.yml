name: 🏆 WM26 ehonda-ai-arena 🏆 gpt-5.5 xhigh 🏆 Bonus

on:
  # 🚫 Deactivated: WM26 bonus predictions are locked in now that the tournament has started.
  # Keep an inert trigger so the workflow file remains valid while disabled.
  workflow_call:
  # WM26 bonus runs are no longer needed and only burn runner time plus a few database lookups.
  # schedule:
  #   - cron: '47 0,7,12 * * *'
  #
  # Manual triggering is also disabled because WM26 bonus predictions are already locked in.
  # workflow_dispatch:
  #   inputs:
  #     force_prediction:
  #       description: 'Force prediction even if verify passes'
  #       required: false
  #       default: false
  #       type: boolean
  #     max_repredictions:
  #       description: 'Maximum number of repredictions allowed (0-based index)'
  #       required: false
  #       default: 2
  #       type: number

jobs:
  call-base-workflow:
    name: Run Bonus Predictions
    uses: ./.github/workflows/base-bonus-predictions.yml
    with:
      community: "ehonda-ai-arena"
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
      max_output_tokens: 40000
      community_context: "ehonda-ai-arena"
      trigger_type: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
      force_prediction: ${{ github.event.inputs.force_prediction == 'true' }}
      max_repredictions: ${{ fromJSON(github.event.inputs.max_repredictions || '2') }}
    secrets:
      kicktipp_username: ${{ secrets.EHONDA_AI_ARENA_GPT_5_5_XHIGH_KICKTIPP_USERNAME }}
      kicktipp_password: ${{ secrets.EHONDA_AI_ARENA_GPT_5_5_XHIGH_KICKTIPP_PASSWORD }}
      firebase_project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      firebase_service_account_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
