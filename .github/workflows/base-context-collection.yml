name: Base Context Collection

# Reusable workflow for context collection
on:
  workflow_call:
    inputs:
      community_context:
        description: 'Community context (rules/scoring) to use for context collection'
        required: true
        type: string
      competition:
        description: 'Competition identifier for context collection'
        required: false
        type: string
        default: ''
      include_fifa_rankings:
        description: 'Whether to collect WM26 FIFA ranking context after Kicktipp context'
        required: false
        type: boolean
        default: false
      include_lineups:
        description: 'Whether to collect WM26 lineup context after Kicktipp context'
        required: false
        type: boolean
        default: false
      trigger_type:
        description: 'How this workflow was triggered (scheduled, manual)'
        required: true
        type: string
    secrets:
      kicktipp_username:
        description: 'Kicktipp username'
        required: true
      kicktipp_password:
        description: 'Kicktipp password'
        required: true
      firebase_project_id:
        description: 'Firebase project ID'
        required: true
      firebase_service_account_json:
        description: 'Firebase service account JSON'
        required: true

env:
  TZ: 'Europe/Berlin'

jobs:
  context-collection:
    name: Context Collection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build project
        run: dotnet build --no-restore --configuration Release
        
      - name: Run context collection
        run: |
          args=(
            collect-context kicktipp
            --community-context "${{ inputs.community_context }}"
            --verbose
          )

          if [ -n "${{ inputs.competition }}" ]; then
            args+=(--competition "${{ inputs.competition }}")
          fi

          dotnet run --project src/Orchestrator/Orchestrator.csproj --configuration Release -- \
            "${args[@]}"
        env:
          KICKTIPP_USERNAME: ${{ secrets.kicktipp_username }}
          KICKTIPP_PASSWORD: ${{ secrets.kicktipp_password }}
          FIREBASE_PROJECT_ID: ${{ secrets.firebase_project_id }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.firebase_service_account_json }}

      - name: Run WM26 recent-history played-date map
        if: ${{ inputs.competition == 'fifa-world-cup-2026' }}
        run: |
          dotnet run --project src/Orchestrator/Orchestrator.csproj --configuration Release -- \
            wm26-recent-history apply-date-map \
            --community-context "${{ inputs.community_context }}" \
            --competition "${{ inputs.competition }}" \
            --input data/wm26/recent-history/recent-history-match-dates.csv \
            --apply-known-only \
            --preserve-collected-on-or-after 2026-06-11 \
            --verbose
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.firebase_project_id }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.firebase_service_account_json }}

      - name: Run WM26 FIFA ranking collection
        if: ${{ inputs.include_fifa_rankings }}
        run: |
          args=(
            collect-context fifa
            --community-context "${{ inputs.community_context }}"
            --verbose
          )

          if [ -n "${{ inputs.competition }}" ]; then
            args+=(--competition "${{ inputs.competition }}")
          fi

          dotnet run --project src/Orchestrator/Orchestrator.csproj --configuration Release -- \
            "${args[@]}"
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.firebase_project_id }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.firebase_service_account_json }}

      - name: Run WM26 lineup collection
        if: ${{ inputs.include_lineups }}
        run: |
          args=(
            collect-context lineups
            --community-context "${{ inputs.community_context }}"
            --verbose
          )

          if [ -n "${{ inputs.competition }}" ]; then
            args+=(--competition "${{ inputs.competition }}")
          fi

          dotnet run --project src/Orchestrator/Orchestrator.csproj --configuration Release -- \
            "${args[@]}"
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.firebase_project_id }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.firebase_service_account_json }}
        
      - name: Build summary
        if: always()
        run: |
          echo "## Context Collection Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Community Context**: ${{ inputs.community_context }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Competition**: ${{ inputs.competition || 'default' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Recent-history played-date map**: ${{ inputs.competition == 'fifa-world-cup-2026' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **FIFA Rankings**: ${{ inputs.include_fifa_rankings }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Lineups**: ${{ inputs.include_lineups }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ inputs.trigger_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
