name: 🏆 WM26 ehonda-ai-arena 🏆 Context Collection

on:
  workflow_call:
  # WM26 cadence: refresh before each prediction window.
  # GitHub Actions cron runs in UTC only.
  # schedule:
  #   - cron: '47 23,6,11 * * *'
  workflow_dispatch:

jobs:
  call-base-workflow:
    name: Context Collection - ehonda-ai-arena
    uses: ./.github/workflows/base-context-collection.yml
    with:
      community_context: "ehonda-ai-arena"
      competition: "fifa-world-cup-2026"
      include_fifa_rankings: true
      include_lineups: true
      trigger_type: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
    secrets:
      kicktipp_username: ${{ secrets.EHONDA_AI_ARENA_GPT_5_NANO_MINIMAL_KICKTIPP_USERNAME }}
      kicktipp_password: ${{ secrets.EHONDA_AI_ARENA_GPT_5_NANO_MINIMAL_KICKTIPP_PASSWORD }}
      firebase_project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      firebase_service_account_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
